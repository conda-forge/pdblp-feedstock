{% set name = "pdblp" %}
{% set version = "0.1.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pdblp/pdblp-{{ version }}.tar.gz
  sha256: ccbecf941f1e88b85c6d6801785e0f76a54280dc3d2d39e7bd3836457da57192

build:
  number: 2
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  noarch: python

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - pandas
    - python >={{ python_min }}
    - blpapi

test:
    requires:
        - python {{ python_min }}
    imports:
        - pdblp

about:
  home: https://github.com/matthewgilbert/pdblp
  license: MIT
  license_file: LICENSE
  summary: 'Bloomberg Open API with pandas'

extra:
  recipe-maintainers:
    - matthewgilbert
